# GoReleaser v2 configuration
version: 2

project_name: agentfield

before:
  hooks:
    - npm --prefix control-plane/web/client install --silent
    - npm --prefix control-plane/web/client run build --silent

builds:
  - id: agentfield-linux-amd64
    dir: control-plane
    main: ./cmd/af
    binary: agentfield-linux-amd64
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    tags:
      - embedded
      - sqlite_fts5

  - id: agentfield-linux-arm64
    dir: control-plane
    main: ./cmd/af
    binary: agentfield-linux-arm64
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    tags:
      - embedded
      - sqlite_fts5

  - id: agentfield-darwin-amd64
    dir: control-plane
    main: ./cmd/af
    binary: agentfield-darwin-amd64
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    tags:
      - embedded
      - sqlite_fts5

  - id: agentfield-darwin-arm64
    dir: control-plane
    main: ./cmd/af
    binary: agentfield-darwin-arm64
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    tags:
      - embedded
      - sqlite_fts5

  # AgentField desktop tray (menu-bar companion). macOS only — it carries the
  # systray/Cocoa (CGO) dependency so the control-plane binary never has to.
  # A separate, small binary; the installer fetches it only on macOS.
  - id: agentfield-tray-darwin-amd64
    dir: control-plane
    main: ./cmd/af-tray
    binary: agentfield-tray-darwin-amd64
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

  - id: agentfield-tray-darwin-arm64
    dir: control-plane
    main: ./cmd/af-tray
    binary: agentfield-tray-darwin-arm64
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

  # Windows CLI/server binary (goreleaser appends .exe automatically).
  # Groundwork only: the release workflow's build matrix filters by --id and
  # does not build this id yet. CGO is required (mattn/go-sqlite3 with
  # sqlite_fts5), so building it needs either a windows runner (drop the CC
  # override) or mingw-w64 on the linux runner (mirrors the aarch64
  # cross-compile approach).
  - id: agentfield-windows-amd64
    dir: control-plane
    main: ./cmd/af
    binary: agentfield-windows-amd64
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    tags:
      - embedded
      - sqlite_fts5

# Don't create archives - ship raw binaries
archives:
  - id: default
    ids:
      - agentfield-linux-amd64
      - agentfield-linux-arm64
      - agentfield-darwin-amd64
      - agentfield-darwin-arm64
      - agentfield-windows-amd64
      - agentfield-tray-darwin-amd64
      - agentfield-tray-darwin-arm64
    formats: [binary]
    # Each build's `binary:` is already the exact asset name we want
    # (agentfield-<os>-<arch> and agentfield-tray-darwin-<arch>); goreleaser
    # appends .exe for the windows build on its own.
    name_template: "{{ .Binary }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Agent-Field
    name: agentfield
  draft: false
  prerelease: auto
  name_template: "AgentField v{{ .Version }}"
  header: |
    ## AgentField v{{ .Version }}

    ### Installation

    **Installation:**
    ```bash
    curl -fsSL https://agentfield.ai/install.sh | bash
    ```

    ### Version Pinning

    ```bash
    VERSION={{ .Version }} curl -fsSL https://agentfield.ai/install.sh | bash
    ```

    ### Manual Download

    Download the binary for your platform below, make it executable, and move it to your PATH.

    ### Supported Platforms

    - **macOS Intel:** `agentfield-darwin-amd64`
    - **macOS Apple Silicon:** `agentfield-darwin-arm64`
    - **Linux x86_64:** `agentfield-linux-amd64`
    - **Linux ARM64:** `agentfield-linux-arm64`

changelog:
  use: git
  sort: asc
  abbrev: 0
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^style:'
